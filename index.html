<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IceChoco x Hora de Aventura</title>

  <link rel="stylesheet" href="intro.css">
</head>

<body>

<video id="intro" autoplay playsinline preload="auto">
  <source src="videos/intro1.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("intro");

// garante tentativa de play
video.play().catch(() => {});

// libera áudio após interação
document.addEventListener("click", () => {
    video.muted = false;
    video.play();
}, { once: true });
</script>
  
<button id="skipBtn">Pular Intro</button>

  <script src="intro.js"></script>

</body>
</html>
